name: CI

on:
  push:
    branches: [main]
    paths-ignore: ['README.md']
  pull_request:
    branches: [main]
    paths-ignore: ['README.md']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      # Install from PyPI rather than the local ../vgi-python path used for
      # `uv run` during development, so CI is self-contained.
      - name: Install dependencies
        run: |
          uv venv
          uv pip install vgi-python "fastembed>=0.3" pyarrow pytest
          uv pip install -e . --no-deps

      # Pre-warm the fastembed cache so the model download happens once, here,
      # rather than inline during the first test (and so the model-gated tests run).
      - name: Warm the embedding model cache
        run: uv run --no-sync python -c "from vgi_embed import models; models.warm_up()"

      - name: Run tests
        run: uv run --no-sync pytest

  # Resolve the latest published haybarn release once, so the whole matrix tests
  # the same version (and we never hardcode/pin it).
  resolve-haybarn:
    name: Resolve haybarn release
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.r.outputs.release }}
    steps:
      - id: r
        run: |
          REL=$(gh release view --repo Query-farm-haybarn/haybarn --json tagName --jq .tagName)
          echo "release=$REL" >> "$GITHUB_OUTPUT"
          echo "Latest haybarn release: $REL"
        env:
          GH_TOKEN: ${{ github.token }}

  integration:
    name: SQL E2E (${{ matrix.transport }}) on ${{ matrix.os }}
    needs: resolve-haybarn
    strategy:
      fail-fast: false
      matrix:
        # Run the SAME sqllogictest suite over every VGI transport. The vgi
        # extension picks the transport from the ATTACH LOCATION string that
        # run-integration.sh builds per $TRANSPORT:
        #   subprocess : `uv run embed_worker.py`  (stdio; extension spawns it)
        #   http       : `http://127.0.0.1:<port>` (worker booted with --http)
        #   unix       : `unix://<sock>`           (worker booted with --unix)
        os: [ubuntu-latest, macos-latest]
        transport: [subprocess, http, unix]
        include:
          - { os: ubuntu-latest, asset: haybarn_unittest-linux-amd64.zip }
          - { os: macos-latest,  asset: haybarn_unittest-osx-arm64.zip }
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    env:
      # Pin fastembed's model cache to a fixed path so the warm step, the worker
      # subprocess, and actions/cache all agree on where the ONNX model lives.
      FASTEMBED_CACHE_PATH: ${{ github.workspace }}/.fastembed_cache
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Set up Python 3.13
        run: uv python install 3.13

      # onnxruntime (via fastembed) dynamically loads libomp on macOS; install it
      # so the ONNX session can be created when the suite first embeds text.
      - name: Install libomp (macOS)
        if: runner.os == 'macOS'
        run: brew install libomp

      - name: Install the worker (from the lockfile, with the http extra)
        # The `http` extra pulls in waitress so the worker can serve `--http`.
        # Harmless for the subprocess/unix legs; required for the http leg.
        run: uv sync --frozen --extra http --python 3.13

      # fastembed downloads the default ONNX model (BAAI/bge-small-en-v1.5, ~130MB)
      # from HuggingFace on first use; cache it so reruns don't re-download.
      - name: Cache the embedding model
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.fastembed_cache
          key: fastembed-${{ runner.os }}-bge-small-en-v1.5

      - name: Warm the embedding model cache
        run: uv run --no-sync python -c "from vgi_embed import models; models.warm_up()"

      - name: Download haybarn-unittest
        run: |
          gh release download "$HAYBARN_RELEASE" \
            --repo Query-farm-haybarn/haybarn \
            --pattern '${{ matrix.asset }}' \
            --output haybarn-unittest.zip --clobber
          mkdir -p hb && unzip -o -q haybarn-unittest.zip -d hb
        env:
          GH_TOKEN: ${{ github.token }}
          HAYBARN_RELEASE: ${{ needs.resolve-haybarn.outputs.release }}

      - name: Resolve runner + worker paths
        run: |
          # Absolute paths: run-integration.sh cd's into a staging dir before
          # invoking the runner, so relative paths would not resolve. The worker
          # is a repo-root PEP 723 script (no console-script). `--no-sync` makes
          # `uv run` reuse the already-synced project venv instead of
          # re-resolving the inline deps, so an absolute script path spawns
          # correctly regardless of cwd — exactly how DuckDB ATTACH and the
          # pytest fixture drive it.
          UNITTEST="$PWD/$(find hb -name 'haybarn-unittest' -type f | head -1)"
          chmod +x "$UNITTEST"
          echo "HAYBARN_UNITTEST=$UNITTEST" >> "$GITHUB_ENV"
          echo "VGI_EMBED_WORKER=uv run --no-sync --python 3.13 $PWD/embed_worker.py" >> "$GITHUB_ENV"

      - name: Run extension integration suite (${{ matrix.transport }})
        run: ci/run-integration.sh
        env:
          TRANSPORT: ${{ matrix.transport }}

  metadata-quality:
    name: Metadata quality (vgi-lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Set up Python 3.13
        run: uv python install 3.13

      # Build the worker exactly as the integration job does, so the linter
      # introspects the same catalog the SQL E2E suite runs against.
      - name: Install the worker (from the lockfile, with the http extra)
        run: uv sync --frozen --extra http --python 3.13

      # Warm the embedding model so the worker boots without an inline download
      # when the linter spawns it for catalog introspection.
      - name: Warm the embedding model cache
        run: uv run --no-sync python -c "from vgi_embed import models; models.warm_up()"

      - name: vgi-lint
        uses: Query-farm/vgi-lint-check@v1
        with:
          version: "0.37.0"
          location: "uv run --no-sync --python 3.13 embed_worker.py"
          fail-on: info

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install tooling
        run: |
          uv venv
          uv pip install vgi-python "fastembed>=0.3" pyarrow ruff mypy pydoclint
          uv pip install -e . --no-deps

      - name: Check formatting
        run: uv run --no-sync ruff format --check .

      - name: Check linting
        run: uv run --no-sync ruff check .

      - name: Type check (mypy)
        run: uv run --no-sync mypy vgi_embed

      - name: Docstring lint (pydoclint)
        run: uvx pydoclint --config pyproject.toml vgi_embed
